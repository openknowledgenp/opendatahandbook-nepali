<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>पृष्ठ फेला परेन · खुल्ला डाटा पुस्तिका</title>
<link rel="icon" href="{{ site.baseurl }}/assets/favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&display=swap" rel="stylesheet">
<script>(function(){try{var s=localStorage.getItem('odh-theme');var d=s?s:(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',d);}catch(e){}})();</script>
<style>
:root{
  --brand:#3E8E2F; --brand-strong:#2F6E23; --brand-soft:#E8F3E1;
  --ink:#1E3018; --body:#3A4536; --muted:#6B7A64;
  --bg:#FFFFFF; --pill:999px; --sh1:0 1px 2px rgba(16,48,46,.06),0 1px 3px rgba(16,48,46,.05);
}
:root[data-theme="dark"]{
  --brand:#79C74F; --brand-strong:#95D66F; --brand-soft:#16300F;
  --ink:#EAF3E4; --body:#C6D3BF; --muted:#8FA386; --bg:#0F1A0C;
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center;
  background:var(--bg); color:var(--body); font-family:'Mukta',system-ui,'Noto Sans Devanagari',sans-serif;
  padding:24px;
}
.mark{width:64px;height:64px;border-radius:16px;background:linear-gradient(150deg,var(--brand),var(--brand-strong));
  display:grid;place-items:center;box-shadow:var(--sh1);margin:0 auto 24px}
.mark svg{width:32px;height:32px}
h1{color:var(--ink);font-size:2rem;font-weight:800;margin:0 0 12px}
p{font-size:1.05rem;margin:0 0 28px}
a.btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;padding:12px 22px;border-radius:var(--pill);
  background:var(--brand);color:#fff;text-decoration:none;box-shadow:var(--sh1);transition:background .18s,transform .18s}
a.btn:hover{background:var(--brand-strong);transform:translateY(-1px)}
</style>
</head>
<body>
<div>
  <div class="mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0"/><circle cx="12" cy="16" r="1.4" fill="#fff" stroke="none"/></svg></div>
  <h1>पृष्ठ फेला परेन</h1>
  <p>माफ गर्नुहोस्, तपाईंले खोज्नुभएको पृष्ठ फेला परेन।</p>
  <a class="btn" href="{{ site.baseurl }}/">गृहपृष्ठमा फर्कनुहोस्</a>
</div>
</body>
</html>
